<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashlight Quiz — Team Right</title>
  <meta name="description" content="Flashlight Quiz — Team Right player screen. Hit BUZZ to answer!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    .player-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem;
      gap: 1.25rem;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    #connectSection { width: 100%; }

    .connect-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .session-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 0.75rem 1rem;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: var(--transition);
      width: 100%;
    }
    .session-input:focus { border-color: var(--color-right); }
    .session-input::placeholder { color: var(--text-muted); }

    .buzz-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
    }

    .player-timer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .question-panel { width: 100%; }

    #endOverlay {
      position: fixed; inset: 0;
      background: rgba(13,27,42,0.96);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .end-card-player {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      text-align: center;
      max-width: 380px;
      width: 100%;
      animation: slideUp 0.5s ease;
    }
  </style>
</head>
<body class="team-right">

  <!-- ════════ BRAND HEADER ════════ -->
  <header class="brand-header">
    <div class="brand-logo">🔦</div>
    <span class="brand-title">FLASHLIGHT</span>
    <span class="role-badge" id="teamLabel">Team Right</span>

    <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem;">
      <span id="connDot" class="conn-dot"></span>
      <span id="connStatus" style="font-size:0.75rem; color:var(--text-muted);">Offline</span>
    </div>
  </header>

  <div class="player-layout">

    <!-- ── Connect Section ── -->
    <div id="connectSection" class="connect-card">
      <p style="font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--color-right);">📡 Connect to Game</p>
      <p style="font-size:0.8rem; color:var(--text-muted);">Enter the Session ID shown on the Animator screen:</p>
      <input
        id="sessionInput"
        class="session-input"
        type="text"
        placeholder="e.g. flashlight-animator-a3b2c"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button id="btnConnect" class="btn btn-large" style="background:var(--color-right); color:#fff; font-size:0.95rem;">🔌 CONNECT</button>
    </div>

    <!-- ── Status Banner ── -->
    <div id="statusBanner" class="status-banner status-waiting" style="width:100%;">
      Enter the Session ID above to join the game.
    </div>

    <!-- ── Timer ── -->
    <div class="player-timer">
      <div class="timer-ring-wrap">
        <svg width="150" height="150" viewBox="0 0 130 130">
          <circle class="timer-ring-bg" cx="65" cy="65" r="54"/>
          <circle id="timerFill" class="timer-ring-fill"
            cx="65" cy="65" r="54"
            stroke-dasharray="339.29"
            stroke-dashoffset="0"/>
        </svg>
        <span id="timerValue" class="timer-text">15</span>
      </div>
      <div class="progress-bar-wrap" style="width:160px;">
        <div id="timerProgress" class="progress-bar-fill" style="width:100%;"></div>
      </div>
    </div>

    <!-- ── BUZZ Area ── -->
    <div class="buzz-area">
      <button id="btnBuzz" class="buzz-btn right-btn" disabled>
        <span>BUZZ</span>
      </button>
      <p style="font-size:0.75rem; color:var(--text-muted);">Press when you know the answer!</p>
    </div>

    <!-- ── Question Display ── -->
    <div class="card question-panel">
      <p id="questionCounter" class="question-counter" style="margin-bottom:0.5rem;">—</p>
      <p id="questionText" class="question-text" style="font-size:1.1rem; text-align:left;">Waiting for the game to start…</p>
      <div class="divider"></div>
      <div id="optionsWrap" class="options-grid">
        <!-- Options injected by player.js -->
      </div>
    </div>

  </div>

  <!-- ════════ END OVERLAY ════════ -->
  <div id="endOverlay" class="hidden">
    <div class="end-card-player">
      <div style="font-size:3rem; margin-bottom:1rem;">🏁</div>
      <div id="endMsg" style="font-family:'Bebas Neue',sans-serif; font-size:2.5rem; margin-bottom:1rem;">Game over!</div>
      <div id="endScores" style="display:flex; flex-direction:column; gap:0.5rem; font-size:1.1rem; margin-bottom:1.5rem;"></div>
      <button onclick="location.reload()" class="btn btn-outline btn-large" style="width:100%;">🔄 Back to Lobby</button>
    </div>
  </div>

  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- Player Logic -->
  <script src="../js/player.js"></script>
</body>
</html>
