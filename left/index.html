<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashlight Quiz — Team Left</title>
  <meta name="description" content="Flashlight Quiz — Team Left player screen. Hit BUZZ to answer!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../public/output.css" />
</head>
<body class="team-left min-h-screen flex flex-col bg-navy text-light">

  <!-- ════════ BRAND HEADER ════════ -->
  <header class="flex items-center gap-3 py-5 px-8 border-b border-dark" style="background: rgba(255,215,0,0.04);">
    <div class="w-10 h-10 bg-gold rounded-full flex items-center justify-center text-xl shrink-0 animate-logo-pulse">🔦</div>
    <span class="font-display text-gold text-2xl tracking-wider">FLASHLIGHT</span>
    <span class="py-1 px-3 rounded-full text-xs font-bold uppercase tracking-wider" id="teamLabel" style="background: rgba(239,68,68,0.12); color: #EF4444; border: 1px solid rgba(239,68,68,0.4);">Team Left</span>
    <div class="ml-auto flex items-center gap-2">
      <span id="connDot" class="conn-dot"></span>
      <span id="connStatus" class="text-xs text-muted">Offline</span>
    </div>
  </header>

  <div class="flex-1 flex flex-col items-center p-5 gap-5 max-w-[680px] mx-auto w-full">

    <!-- Connect Section -->
    <div id="connectSection" class="w-full bg-surface border border-dark rounded-2xl p-6 flex flex-col gap-3" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
      <p class="text-xs font-bold uppercase tracking-wider text-crimson">📡 Connect to Game</p>
      <p class="text-xs text-muted">Enter the Session ID shown on the Animator screen:</p>
      <input id="sessionInput" type="text" placeholder="e.g. flashlight-animator-a3b2c" autocomplete="off" autocorrect="off" spellcheck="false"
             class="w-full py-3 px-4 rounded-xl text-sm text-light border-[1.5px] border-dark outline-none transition-all duration-250 focus:border-crimson" style="background: rgba(255,255,255,0.05); font-family: 'Poppins', sans-serif;" />
      <button id="btnConnect" class="py-4 px-10 bg-crimson text-white font-bold text-base rounded-xl uppercase tracking-wider cursor-pointer transition-all duration-250 hover:-translate-y-0.5">🔌 CONNECT</button>
    </div>

    <!-- Status Banner -->
    <div id="statusBanner" class="status-banner status-waiting">Enter the Session ID above to join the game.</div>

    <!-- Timer -->
    <div class="flex flex-col items-center gap-2">
      <div class="timer-ring-wrap">
        <svg width="150" height="150" viewBox="0 0 130 130">
          <circle class="timer-ring-bg" cx="65" cy="65" r="54"/>
          <circle id="timerFill" class="timer-ring-fill" cx="65" cy="65" r="54" stroke-dasharray="339.29" stroke-dashoffset="0"/>
        </svg>
        <span id="timerValue" class="timer-text absolute font-display text-5xl text-light tracking-wide transition-colors duration-500">15</span>
      </div>
      <div class="progress-bar-wrap w-40">
        <div id="timerProgress" class="progress-bar-fill" style="width:100%;"></div>
      </div>
    </div>

    <!-- BUZZ Area -->
    <div class="flex flex-col items-center gap-6 py-8 px-4">
      <button id="btnBuzz" class="buzz-btn w-72 h-72 max-w-[80vw] max-h-[80vw] bg-crimson text-crimson font-display tracking-[0.15em] cursor-pointer" style="font-size: clamp(2.5rem, 8vw, 4rem); box-shadow: 0 0 40px currentColor;" disabled>
        <span class="text-white">BUZZ</span>
      </button>
      <p class="text-xs text-muted">Press when you know the answer!</p>
    </div>

    <!-- Question Display -->
    <div class="w-full bg-surface border border-dark rounded-2xl p-6" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
      <p id="questionCounter" class="text-xs font-semibold uppercase tracking-[0.15em] text-gold text-center mb-2">—</p>
      <p id="questionText" class="text-lg font-bold leading-snug text-light text-left">Waiting for the game to start…</p>
      <div class="h-px bg-dark my-4"></div>
      <div id="optionsWrap" class="grid grid-cols-2 gap-3 max-sm:grid-cols-1"></div>
    </div>
  </div>

  <!-- ════════ END OVERLAY ════════ -->
  <div id="endOverlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-8" style="background: rgba(13,27,42,0.96); backdrop-filter: blur(8px);">
    <div class="bg-surface border border-dark rounded-2xl p-10 text-center max-w-[380px] w-full animate-slide-up" style="box-shadow: 0 8px 32px rgba(0,0,0,0.4);">
      <div class="text-5xl mb-4">🏁</div>
      <div id="endMsg" class="font-display text-4xl mb-4">Game over!</div>
      <div id="endScores" class="flex flex-col gap-2 text-lg mb-6"></div>
      <button onclick="location.reload()" class="w-full py-4 px-10 bg-transparent text-light font-bold text-base rounded-xl uppercase tracking-wider cursor-pointer border-[1.5px] border-dark transition-all duration-250 hover:border-gold hover:text-gold">🔄 Back to Lobby</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="../js/player.js"></script>
</body>
</html>
